# Azure DevOps sample pipeline for openreview
#
# This repo is developed on GitHub, while the runtime target is Azure DevOps PRs.
# So this file is a ready-to-use template you can copy into Azure DevOps repos.

trigger: none

pr:
  branches:
    include:
      - "*"

pool:
  vmImage: "ubuntu-latest"

steps:
  - checkout: self
    fetchDepth: 0

  - task: UsePythonVersion@0
    inputs:
      versionSpec: "3.11"

  - script: |
      python -m pip install --upgrade pip
      # Option A (recommended during active GitHub development):
      pip install "git+https://github.com/djwinter29/openreview.git@main"
      # For fully reproducible builds, pin a commit instead:
      # pip install "git+https://github.com/djwinter29/openreview.git@<commit_sha>"
      # After stable release on PyPI, switch to:
      # pip install openreview
    displayName: Install openreview

  - script: |
      openreview run \
        --pr-id "$(System.PullRequest.PullRequestId)" \
        --repo-root "$(Build.SourcesDirectory)"
    displayName: AI review and sync comments
    env:
      AZDO_ORG: $(AZDO_ORG)
      AZDO_PROJECT: $(AZDO_PROJECT)
      AZDO_REPO_ID: $(AZDO_REPO_ID)
      AZDO_PAT: $(AZDO_PAT)
      OPENAI_API_KEY: $(OPENAI_API_KEY)
      OPENAI_MODEL: $(OPENAI_MODEL)

  - script: |
      sudo apt-get update
      sudo apt-get install -y doxygen graphviz make latexmk texlive-latex-extra texlive-fonts-recommended
    displayName: Install Doxygen toolchain

  - script: |
      mkdir -p build/docs/doxygen
    displayName: Create documentation output directory

  - script: |
      doxygen Doxyfile
    displayName: Generate Doxygen HTML and LaTeX

  - script: |
      latexmk -pdf -interaction=nonstopmode -halt-on-error refman.tex
    workingDirectory: $(Build.SourcesDirectory)/build/docs/doxygen/latex
    displayName: Build Doxygen PDF

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: $(Build.SourcesDirectory)/build/docs/doxygen/html
      artifact: doxygen-html
      publishLocation: pipeline
    displayName: Publish Doxygen HTML

  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: $(Build.SourcesDirectory)/build/docs/doxygen/latex/refman.pdf
      artifact: doxygen-pdf
      publishLocation: pipeline
    displayName: Publish Doxygen PDF
